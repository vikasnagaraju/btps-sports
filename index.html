<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f0f3fa;font-family:'Inter',sans-serif;color:#0b1530;padding-bottom:80px}

    .conn-status{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px}

    .sync-indicator{display:flex;align-items:center;gap:4px;font-size:8px;color:#9aa6cc;font-weight:600}

  </style>
</head>

<script>
(function(){
const ADMIN_PW = "KPCL57th";
let isAdmin = false, currentTab = 'dashboard', activeFilter='all';
let state = { events: [], notifications: [] };
let lastSeenNotif = 0;
let backendOk = true;
let categoryState = {};
let isSaving = false;
let pendingSync = false;

// ----- BACKEND: Google Apps Script Web App -----
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwIZUqDnapaxZjFNKVfZ1GBE99a2YS-16Xjt1ychX3SC3lV8ryaeRlSM2zx0_OtagEt/exec";

// ----- DATA FUNCTIONS -----
function uid(p){ return p+'-'+Math.random().toString(36).slice(2,7); }
function fmtDate(d){ if(!d)return ''; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}); }
function initials(n){ return n.trim().split(/\s+/).slice(0,2).map(s=>s[0]).join('').toUpperCase(); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }

function normalizeDate(v){
  if(!v) return '';
  if(typeof v === 'string'){
    const m = v.match(/^(\d{4}-\d{2}-\d{2})/);
    if(m) return m[1];
    return v;
  }
  if(v instanceof Date || Object.prototype.toString.call(v) === '[object Date]'){
    const d = new Date(v);
    if(isNaN(d.getTime())) return '';
    return d.toISOString().slice(0,10);
  }
  return String(v);
}

function parseJsonSafe(val){
  if(!val) return [];
  if(typeof val === 'string'){
    try{ return JSON.parse(val); }catch(e){ return []; }
  }
  return Array.isArray(val) ? val : [];
}

function rowsToEvents(rows){
  return rows.map(r => ({
    id: String(r.id || ''),
    name: r.name || '',
    category: r.category || '',
    venue: r.venue || '',
    date: normalizeDate(r.date),
    time: r.time || '',
    status: r.status || 'upcoming',
    teamA: r.teamA || '',
    teamB: r.teamB || '',
    scoreA: r.scoreA || '',
    scoreB: r.scoreB || '',
    winner: r.winner || '',
    note: r.note || '',
    participants: parseJsonSafe(r.participants),
    coordinators: parseJsonSafe(r.coordinators)
  }));
}

function eventsToRows(events){
  return events.map(e => ({
    id: e.id,
    name: e.name,
    category: e.category,
    venue: e.venue,
    date: e.date,
    time: e.time,
    status: e.status,
    teamA: e.teamA || '',
    teamB: e.teamB || '',
    scoreA: e.scoreA || '',
    scoreB: e.scoreB || '',
    winner: e.winner || '',
    note: e.note || '',
    participants: JSON.stringify(e.participants || []),
    coordinators: JSON.stringify(e.coordinators || [])
  }));
}

function rowsToNotifs(rows){
  return rows.map(r => ({
    id: String(r.id || ''),
    title: r.title || '',
    message: r.message || '',
    type: r.type || 'info',
    time: Number(r.time) || Date.now()
  }));
}

async function backendGetAll(){
  try{
    const res = await fetch(BACKEND_URL + "?action=getAll", { method: "GET" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  }catch(e){
    throw new Error("Backend unreachable: " + e.message);
  }
}

async function backendSave(action, data){
  try{
    const body = new URLSearchParams();
    body.set("action", action);
    body.set("data", JSON.stringify(data));
    const res = await fetch(BACKEND_URL, { method: "POST", body });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    return json;
  }catch(e){
    throw new Error("Save failed: " + e.message);
  }
}

// ----- LOAD / SAVE STATE -----
async function loadState(){
  try{
    const data = await backendGetAll();
    backendOk = true;
    let events = (data.events && data.events.length) ? rowsToEvents(data.events) : null;
    if(!events){
      events = SEED_EVENTS.map(e => ({...e, participants: e.participants || [], coordinators: e.coordinators || []}));
    }
    state.events = events;
    let notifs = (data.notifications && data.notifications.length) ? rowsToNotifs(data.notifications) : null;
    if(!notifs){
      notifs = SEED_NOTIFS;
    }
    state.notifications = notifs;
    lastSeenNotif = state.notifications.length;
    updateConnectionDot();
    return true;
  }catch(e){
    console.error('Backend unreachable, using local data', e);
    backendOk = false;
    if(!state.events || !state.events.length){
      state.events = SEED_EVENTS.map(e => ({...e, participants: e.participants || [], coordinators: e.coordinators || []}));
    }
    if(!state.notifications || !state.notifications.length){
      state.notifications = SEED_NOTIFS;
    }
    updateConnectionDot();
    return false;
  }
}

async function saveEvents(){
  if(isSaving) return false;
  isSaving = true;
  document.getElementById('syncIndicator').style.display = 'flex';
  try{
    await backendSave('saveEvents', eventsToRows(state.events));
    backendOk = true;
    toast('Events synced ✓');
    updateConnectionDot();
    return true;
  }catch(e){
    backendOk = false;
    toast('⚠️ Offline — changes saved locally');
    updateConnectionDot();
    return false;
  }finally{
    isSaving = false;
    document.getElementById('syncIndicator').style.display = 'none';
  }
}

async function saveNotifs(){
  try{
    await backendSave('saveNotifications', state.notifications);
    backendOk = true;
    updateConnectionDot();
    return true;
  }catch(e){
    backendOk = false;
    updateConnectionDot();
    return false;
  }
}

function updateConnectionDot(){
  const dot = document.getElementById('connDot');
  const indicator = document.getElementById('syncIndicator');
  if(backendOk){
    dot.style.display = 'none';
    document.getElementById('connStatusBtn').title = 'Connected — synced with sheet';
    indicator.innerHTML = '<span style="color:#1f9d6c">●</span> online';
  }else{
    dot.style.display = 'block';
    document.getElementById('connStatusBtn').title = 'Offline — showing local data';
    indicator.innerHTML = '<span style="color:#d6483d">●</span> offline';
  }
}

// ----- RENDER FUNCTIONS -----
function renderTicker(){
  const el=document.getElementById('marqueeText');
  const live = state.events.find(e=>e.status==='live');
  if(live) el.textContent = `🔴 LIVE: ${live.name}`;
  else {
    const up = state.events.filter(e=>e.status==='upcoming').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
    if(up.length) el.textContent = `📅 UP NEXT: ${up[0].name} · ${fmtDate(up[0].date)} ${up[0].time || 'TBA'}`;
    else el.textContent = '✅ All events completed · 57th Foundation Day';
  }
}

function eventCardHtml(e){
  const pCount = (e.participants||[]).length;
  let scoreHtml = '';
  if(e.teamA && e.teamB && (e.scoreA || e.scoreB || e.winner)){
    const aW=e.winner==='A', bW=e.winner==='B', tie=e.winner==='tie';
    scoreHtml = `<div class="scorecard">
      <div class="sc-row"><span class="sc-team">${aW?'🏆 ':''}${escapeHtml(e.teamA)}</span><span class="sc-runs">${escapeHtml(e.scoreA||'—')}</span></div>
      <div class="sc-vs">vs</div>
      <div class="sc-row"><span class="sc-team">${bW?'🏆 ':''}${escapeHtml(e.teamB)}</span><span class="sc-runs">${escapeHtml(e.scoreB||'—')}</span></div>
      ${e.winner?`<div class="sc-result">${tie?'🤝 Match Tied':`🏆 ${escapeHtml(aW?e.teamA:e.teamB)} won`}</div>`:''}
    </div>`;
  }
  return `<div class="card ${e.category==='Cricket'?'card-cricket':''}" data-id="${e.id}">
    <div class="card-header"><div><div class="card-title">${escapeHtml(e.name)}</div><div class="card-cat">${escapeHtml(e.category)}</div></div>
    <span class="status ${e.status}">${e.status==='live'?'🔴 LIVE':e.status}</span></div>
    <div class="meta"><span>📅 ${fmtDate(e.date)}</span><span>⏱ ${escapeHtml(e.time)||'TBA'}</span><span>📍 ${escapeHtml(e.venue)}</span></div>
    ${scoreHtml}
    <div style="margin-top:8px"><span class="participant-pill">👤 ${pCount} registered</span></div>
  </div>`;
}

// ----- DASHBOARD -----
function renderDashboard(){
  const c=document.getElementById('content');
  const total=state.events.length, done=state.events.filter(e=>e.status==='completed').length;
  const liveCount=state.events.filter(e=>e.status==='live').length;
  const upcoming=state.events.filter(e=>e.status==='upcoming').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).slice(0,6);
  const pct=total?Math.round((done/total)*100):0;
  const circumference = 2 * Math.PI * 24;
  const offset = circumference * (1 - pct/100);
  
  let html='';
  if(isAdmin) html+=`<div class="admin-banner">🔑 Admin mode — edits sync to all employees</div>`;
  
  html+=`<div class="hero-stats">
    <div class="hero-stat"><span class="emoji">🏏</span><div class="num">${state.events.filter(e=>e.category==='Cricket').length}</div><div class="lbl">Cricket</div></div>
    <div class="hero-stat"><span class="emoji">🏆</span><div class="num">${done}</div><div class="lbl">Completed</div></div>
    <div class="hero-stat"><span class="emoji">📅</span><div class="num">${upcoming.length}</div><div class="lbl">Upcoming</div></div>
  </div>`;

  const facts = ['🔥 "Champions are made when no one is watching"','💪 "Play with heart, win with pride"','🏅 "Every game is a new opportunity"','🌟 "KPCL family — united in sport"','🎯 "Focus. Execute. Celebrate."'];
  const fact = facts[Math.floor(Math.random() * facts.length)];
  html+=`<div class="fun-fact"><span class="icon">💡</span><span class="text">${fact}</span></div>`;

  html+=`<div class="progress-ring">
    <div class="ring"><svg><circle class="bg" cx="30" cy="30" r="24"/><circle class="fg" cx="30" cy="30" r="24" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg><div class="center">${pct}<small>%</small></div></div>
    <div class="ring-text"><div class="pct">${done} of ${total} events done</div><div class="sub">${liveCount > 0 ? `🔴 ${liveCount} live now` : '🏁 Keep going!'}</div></div>
  </div>`;

  if(upcoming.length){
    html+=`<div class="section-title">📅 Coming up <small>${upcoming.length}</small></div>`;
    upcoming.forEach(e=>html+=eventCardHtml(e));
  }

  const recentCricket = state.events.filter(e=>e.category==='Cricket' && e.status==='completed' && (e.scoreA || e.scoreB)).slice(-4).reverse();
  if(recentCricket.length){
    html+=`<div class="section-title">🏏 Recent Cricket Results</div>`;
    recentCricket.forEach(e=>html+=eventCardHtml(e));
  }

  c.innerHTML=html;
  bindCards();
  renderTicker();
}

// ----- EVENTS (Grouped) -----
function renderEvents(){
  const c=document.getElementById('content');
  const cats = ['all', ...new Set(state.events.filter(e=>e.category!=='Cricket').map(e=>e.category))];
  let filtered = activeFilter==='all' ? state.events.filter(e=>e.category!=='Cricket') : state.events.filter(e=>e.category===activeFilter);
  filtered = filtered.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));

  let html = `<div class="chip-group">`;
  cats.forEach(cat=>{ html+=`<span class="chip ${activeFilter===cat?'active':''}" data-cat="${cat}">${cat}</span>`; });
  html+=`</div>`;

  if(!filtered.length){ html+=`<div class="empty">No events in this category</div>`; }
  else {
    const grouped = {};
    filtered.forEach(e=>{ 
      if(!grouped[e.category]) grouped[e.category] = [];
      grouped[e.category].push(e);
    });
    Object.keys(grouped).forEach(cat=>{
      if(categoryState[cat] === undefined) categoryState[cat] = true;
      const isOpen = categoryState[cat];
      html+=`<div class="category-group">
        <div class="category-header" data-cat="${cat}">
          <span class="cat-name">📂 ${cat}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="cat-count">${grouped[cat].length} events</span>
            <span class="cat-arrow ${isOpen?'open':''}">▼</span>
          </div>
        </div>
        <div class="category-body" style="display:${isOpen?'block':'none'}">
          ${grouped[cat].map(e=>eventCardHtml(e)).join('')}
        </div>
      </div>`;
    });
  }

  c.innerHTML=html;
  document.querySelectorAll('.category-header').forEach(el=>{
    el.onclick=()=>{
      const cat = el.dataset.cat;
      categoryState[cat] = !categoryState[cat];
      const body = el.nextElementSibling;
      body.style.display = categoryState[cat] ? 'block' : 'none';
      el.querySelector('.cat-arrow').classList.toggle('open');
    };
  });
  document.querySelectorAll('.chip').forEach(el=>{ el.onclick=()=>{ activeFilter=el.dataset.cat; renderEvents(); }; });
  bindCards(); renderTicker();
}

function renderAlerts(){
  const c=document.getElementById('content');
  let html=`<div class="section-title">🔔 Alerts <small>${state.notifications.length}</small></div>`;
  if(isAdmin){
    html+=`<div style="background:#fff;border-radius:14px;padding:12px;border:1px solid #eef1fb;margin-bottom:12px">
      <input id="notifTitle" placeholder="Title" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin-bottom:6px">
      <textarea id="notifMsg" rows="2" placeholder="Message" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin-bottom:6px"></textarea>
      <button class="btn btn-amber" id="sendNotifBtn">📢 Send broadcast</button>
    </div>`;
  }
  state.notifications.slice().sort((a,b)=>b.time-a.time).forEach(n=>{
    html+=`<div style="background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:8px;border-left:4px solid ${n.type==='alert'?'#f5a623':'#27439a'}">
      <div style="font-weight:800;font-size:13px">${escapeHtml(n.title)}</div>
      <div style="font-size:12px;color:#525d7a;margin:2px 0">${escapeHtml(n.message)}</div>
      <div style="font-size:10px;color:#9aa6cc">${new Date(n.time).toLocaleString()}</div>
    </div>`;
  });
  c.innerHTML=html;
  if(isAdmin) document.getElementById('sendNotifBtn')?.addEventListener('click', async ()=>{
    const title=document.getElementById('notifTitle').value.trim();
    const msg=document.getElementById('notifMsg').value.trim();
    if(!title||!msg) return toast('Fill title and message');
    state.notifications.push({id:uid('n'),title,message:msg,type:'info',time:Date.now()});
    await saveNotifs();
    toast('Broadcast sent ✓');
    renderAlerts();
  });
  renderTicker();
}

function bindCards(){
  document.querySelectorAll('.card[data-id]').forEach(el=>{ el.onclick=()=>openSheet(el.dataset.id); });
}

// ----- OPEN SHEET WITH PARTICIPANT SAVE -----
function openSheet(id){
  const ev = state.events.find(e=>e.id===id);
  if(!ev) return;
  if(!ev.participants) ev.participants = [];
  const participants = ev.participants;
  
  const sheet = document.getElementById('sheet');
  let html = `<div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="font-size:17px">${escapeHtml(ev.name)}</h3>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>
    <div style="margin:6px 0 8px"><span class="status ${ev.status}">${ev.status}</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;background:#f4f6fc;border-radius:12px;padding:10px">
      <div><span style="color:#525d7a">Category</span><br><strong>${escapeHtml(ev.category)}</strong></div>
      <div><span style="color:#525d7a">Venue</span><br><strong>${escapeHtml(ev.venue)}</strong></div>
      <div><span style="color:#525d7a">Date</span><br><strong>${fmtDate(ev.date)}</strong></div>
      <div><span style="color:#525d7a">Time</span><br><strong>${escapeHtml(ev.time)||'TBA'}</strong></div>
    </div>`;
  
  // Participants
  html += `<div style="margin-top:12px;font-weight:700;font-size:12px">👥 Participants <small style="font-weight:400;color:#525d7a">${participants.length}</small></div>`;
  if(isAdmin){
    html += `<div style="display:flex;gap:6px;margin:6px 0">
      <input id="partName" placeholder="Name" style="flex:2;padding:6px 10px;border-radius:8px;border:1px solid #e2e6f0;font-size:12px">
      <input id="partPhone" placeholder="Phone" style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid #e2e6f0;font-size:12px">
      <button class="btn" style="width:auto;padding:6px 14px;font-size:12px;background:#f5a623;color:#0b1530" id="addPartBtn">Add</button>
    </div>`;
  }
  if(participants.length){
    participants.forEach((p, idx)=>{
      html += `<div class="participant-row">
        <div><div class="pname">${escapeHtml(p.name)}</div>${p.phone ? `<div class="pphone">${escapeHtml(p.phone)}</div>` : ''}</div>
        ${isAdmin ? `<button class="remove-btn" data-idx="${idx}" title="Remove">✕</button>` : ''}
      </div>`;
    });
  } else {
    html += `<div style="font-size:12px;color:#8a95bd;padding:4px 0">No participants registered yet</div>`;
  }

  // Cricket score editor
  if(isAdmin && ev.teamA && ev.teamB){
    html += `<div style="margin-top:12px;font-weight:700;font-size:12px">✎ Update Score & Winner</div>
      <div style="display:flex;gap:8px;margin:6px 0">
        <input id="scA" placeholder="${escapeHtml(ev.teamA)} score" value="${escapeHtml(ev.scoreA||'')}" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e2e6f0">
        <input id="scB" placeholder="${escapeHtml(ev.teamB)} score" value="${escapeHtml(ev.scoreB||'')}" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e2e6f0">
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <button class="winner-btn ${ev.winner==='A'?'active':''}" style="padding:4px 12px;border-radius:40px;border:1px solid #e2e6f0;background:${ev.winner==='A'?'#f5a623':'#fff'};font-weight:700;cursor:pointer" data-win="A">🏆 ${escapeHtml(ev.teamA)}</button>
        <button class="winner-btn ${ev.winner==='B'?'active':''}" style="padding:4px 12px;border-radius:40px;border:1px solid #e2e6f0;background:${ev.winner==='B'?'#f5a623':'#fff'};font-weight:700;cursor:pointer" data-win="B">🏆 ${escapeHtml(ev.teamB)}</button>
        <button class="winner-btn ${ev.winner==='tie'?'active':''}" style="padding:4px 12px;border-radius:40px;border:1px solid #e2e6f0;background:${ev.winner==='tie'?'#f5a623':'#fff'};font-weight:700;cursor:pointer" data-win="tie">🤝 Tie</button>
        <button class="winner-btn ${!ev.winner?'active':''}" style="padding:4px 12px;border-radius:40px;border:1px solid #e2e6f0;background:${!ev.winner?'#f5a623':'#fff'};font-weight:700;cursor:pointer" data-win="">—</button>
      </div>
      <button class="btn" id="updateScoreBtn">Update Score</button>
      <div style="margin-top:6px;display:flex;gap:6px">
        <button class="btn" style="background:#e8f6ee;color:#1f9d6c;padding:8px" id="markComplete">✅ Mark Completed</button>
        <button class="btn" style="background:#fff0db;color:#b06a06;padding:8px" id="markLive">🔴 Mark Live</button>
      </div>`;
  }
  if(ev.coordinators && ev.coordinators.length){
    html += `<div style="margin-top:12px;font-weight:700;font-size:12px">📞 Coordinators</div>`;
    ev.coordinators.forEach(c=>{
      html += `<a href="tel:${escapeHtml(c.phone)}" style="display:flex;justify-content:space-between;background:#f4f6fc;padding:6px 10px;border-radius:8px;margin-top:4px;text-decoration:none;color:inherit">
        <span>${escapeHtml(c.name)}</span><span style="color:#1f9d6c">${escapeHtml(c.phone)}</span>
      </a>`;
    });
  }
  sheet.innerHTML = html;
  document.getElementById('sheetClose').onclick = ()=>document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheetOverlay').classList.add('open');

  // ----- ADD PARTICIPANT (SAVES TO STATE & SYNC) -----
  if(isAdmin){
    const addBtn = document.getElementById('addPartBtn');
    if(addBtn){
      addBtn.onclick = async ()=>{
        const name = document.getElementById('partName').value.trim();
        const phone = document.getElementById('partPhone').value.trim();
        if(!name) return toast('Enter a name');
        ev.participants.push({name, phone});
        await saveEvents();
        toast('Participant added ✓');
        openSheet(id);
        renderCurrentTab();
      };
    }
    document.querySelectorAll('.remove-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = parseInt(btn.dataset.idx, 10);
        ev.participants.splice(idx, 1);
        await saveEvents();
        toast('Participant removed');
        openSheet(id);
        renderCurrentTab();
      };
    });
  }

  // Score update logic
  if(isAdmin && ev.teamA && ev.teamB){
    document.querySelectorAll('.winner-btn').forEach(b=>{
      b.onclick = ()=>{
        document.querySelectorAll('.winner-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        ev.winner = b.dataset.win;
      };
    });
    document.getElementById('updateScoreBtn').onclick = async ()=>{
      ev.scoreA = document.getElementById('scA').value.trim();
      ev.scoreB = document.getElementById('scB').value.trim();
      await saveEvents();
      toast('Score updated ✓');
      document.getElementById('sheetOverlay').classList.remove('open');
      renderCurrentTab();
    };
    document.getElementById('markComplete').onclick = async ()=>{
      ev.status='completed';
      await saveEvents();
      toast('Marked completed');
      document.getElementById('sheetOverlay').classList.remove('open');
      renderCurrentTab();
    };
    document.getElementById('markLive').onclick = async ()=>{
      ev.status='live';
      await saveEvents();
      toast('Marked live');
      document.getElementById('sheetOverlay').classList.remove('open');
      renderCurrentTab();
    };
  }
}

// ----- TAB SWITCHING -----
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('fabAdd').classList.toggle('show', isAdmin && tab==='events');
  if(tab==='dashboard') renderDashboard();
  else if(tab==='events') renderEvents();
  else if(tab==='cricket') renderCricket();
  else if(tab==='organisers') renderOrganisers();
  else if(tab==='alerts') renderAlerts();
}
document.querySelectorAll('.tab').forEach(el=>el.onclick=()=>setTab(el.dataset.tab));
document.getElementById('bellBtn').onclick=()=>setTab('alerts');

// ADMIN
document.getElementById('adminToggleBtn').onclick=()=>{
  if(isAdmin){ isAdmin=false; toast('Switched to employee view'); renderCurrentTab(); return; }
  document.getElementById('loginScreen').style.display='flex';
};
document.getElementById('loginCancel').onclick=()=>document.getElementById('loginScreen').style.display='none';
document.getElementById('loginSubmit').onclick=()=>{
  if(document.getElementById('adminPw').value===ADMIN_PW){ isAdmin=true; document.getElementById('loginScreen').style.display='none'; toast('Admin mode'); renderCurrentTab(); }
  else document.getElementById('loginErr').style.display='block';
};
document.getElementById('adminPw').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('loginSubmit').click(); });

document.getElementById('fabAdd').onclick=()=>{
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="sheet-handle"></div><h3 style="font-size:17px">Add Event</h3>
  <input id="neName" placeholder="Event name" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin:6px 0">
  <input id="neCat" placeholder="Category" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin:6px 0">
  <div style="display:flex;gap:6px"><input id="neDate" type="date" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e2e6f0"><input id="neTime" placeholder="Time" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e2e6f0"></div>
  <input id="neVenue" placeholder="Venue" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin:6px 0">
  <button class="btn" id="neSave">Create</button>
  <button class="btn" style="background:#f4f6fc;color:#0b1530;margin-top:6px" id="neCancel">Cancel</button>`;
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('neCancel').onclick=()=>document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('neSave').onclick=async ()=>{
    const name=document.getElementById('neName').value.trim();
    if(!name) return toast('Enter name');
    state.events.push({id:uid('ev'),name,category:document.getElementById('neCat').value.trim()||'General',venue:document.getElementById('neVenue').value.trim()||'BTPS',date:document.getElementById('neDate').value||'2026-07-20',time:document.getElementById('neTime').value.trim()||'TBA',status:'upcoming',participants:[],coordinators:[]});
    await saveEvents();
    toast('Event added ✓');
    document.getElementById('sheetOverlay').classList.remove('open');
    renderCurrentTab();
  };
};

function renderCurrentTab(){ setTab(currentTab); }

// ----- INIT -----
async function init(){
  await loadState();
  renderCurrentTab();
  // Auto-sync every 30s
  setInterval(async ()=>{
    if(!isSaving){
      await loadState();
      if(!document.getElementById('sheetOverlay').classList.contains('open')){
        renderCurrentTab();
      }
    }
  }, 30000);
}
init();

})();
</script>
