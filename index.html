<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>57th Foundation Day · Karnataka PowerCorporation Ltd, BTPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#f0f3fa;font-family:'Inter',sans-serif;color:#0b1530;padding-bottom:80px}
    .app{max-width:500px;margin:0 auto;padding:12px 14px 20px}
    .header{background:linear-gradient(145deg,#0b1530,#1a306a);border-radius:28px;padding:18px 16px 12px;color:#fff;box-shadow:0 8px 20px rgba(11,21,48,.25)}
    .top-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .brand-icon{width:42px;height:42px;background:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0;padding:4px}
    .brand-icon img{width:100%;height:100%;object-fit:contain;display:block}
    .brand-text{line-height:1.2;min-width:0}
    .brand-text .event{font-size:13px;font-weight:800;color:#f5a623;letter-spacing:.1px;white-space:normal}
    .brand-text .sub{font-size:10px;font-weight:700;color:#b6bedd;margin-top:2px;letter-spacing:.4px;text-transform:uppercase}
    .header-actions{display:flex;gap:6px;align-items:center}
    .icon-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
    .badge-dot{width:8px;height:8px;background:#d6483d;border-radius:50%;position:absolute;top:-2px;right:-2px;border:2px solid #0b1530}
    .badge-dot.blink{animation:blinkAlert 1s ease-in-out infinite}
    @keyframes blinkAlert{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.7)}}
    .marquee{background:rgba(255,255,255,.06);border-radius:40px;padding:6px 0 6px 10px;margin-top:12px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.08);overflow:hidden}
    .marquee .live{width:8px;height:8px;background:#f5a623;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
    @keyframes pulse{0%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
    .marquee-track{flex:1;min-width:0;overflow:hidden;position:relative}
    .marquee-text{display:inline-block;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;padding-left:100%;animation-name:marqueeScroll;animation-timing-function:linear;animation-iteration-count:infinite}
    .marquee-text .sep{color:#f5a623;margin:0 16px;font-weight:800}
    @keyframes marqueeScroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
    @media (prefers-reduced-motion: reduce){.marquee-text{animation:none;padding-left:0}}
    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-top:14px;padding:0 2px}
    .tab{flex-shrink:0;padding:8px 4px;font-size:10px;font-weight:700;color:#9aa6cc;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center;transition:color .15s;border-radius:8px 8px 0 0}
    .tab.active{color:#fff;border-bottom-color:#f5a623;background:rgba(245,166,35,.08)}
    .tab svg{width:16px;height:16px;flex-shrink:0}
    .tab span{font-size:8px;letter-spacing:.2px}
    .content{margin-top:14px}
    .section-title{font-size:15px;font-weight:800;margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center}
    .section-title small{font-size:11px;font-weight:600;color:#525d7a}
    .card{background:#fff;border-radius:18px;padding:14px 14px 12px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.04);border:1px solid #eef1fb;transition:.15s;cursor:pointer}
    .card-cricket{border-left:5px solid #1f9d6c;cursor:pointer}
    .card-cricket .card-title{color:#0b1530}
    .card-cricket:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .card-title{font-size:14px;font-weight:800;line-height:1.3}
    .card-cat{font-size:10px;font-weight:700;color:#27439a;margin-top:2px}
    .status{font-size:9px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:40px;white-space:nowrap}
    .status.upcoming{background:#eef1fb;color:#152854}
    .status.live{background:#fff0db;color:#b06a06}
    .status.completed{background:#e8f6ee;color:#1f9d6c}
    .status.postponed{background:#fdf0e8;color:#9a5a1f}
    .status-set-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
    .status-set-btn{padding:9px 6px;border-radius:9px;border:1.5px solid #e2e6f0;background:#fff;font-size:11px;font-weight:700;color:#525d7a;cursor:pointer;text-align:center}
    .status-set-btn.active{background:#eef1fb;border-color:#152854;color:#152854}
    .status-set-btn.postponed.active{background:#fdf0e8;border-color:#9a5a1f;color:#9a5a1f}
    .meta{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:8px;font-size:11px;color:#525d7a;font-weight:600}
    .meta span{display:flex;align-items:center;gap:4px}
    .meta svg{width:13px;height:13px;opacity:.6}
    .scorecard{background:linear-gradient(145deg,#0b1530,#1a306a);border-radius:14px;padding:12px 14px;margin-top:10px;color:#fff;border:1px solid rgba(245,166,35,.15)}
    .sc-row{display:flex;justify-content:space-between;padding:4px 0;align-items:center}
    .sc-team{font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px}
    .sc-team .trophy{color:#f5a623}
    .sc-runs{font-family:'Oswald',sans-serif;font-size:20px;color:#f5a623}
    .sc-vs{text-align:center;font-size:8px;color:#8390bb;letter-spacing:1px;padding:2px 0}
    .sc-result{text-align:center;font-size:10px;font-weight:700;color:#f5a623;padding-top:6px;border-top:1px solid rgba(255,255,255,.08);margin-top:6px}
    .participant-pill{font-size:10px;font-weight:700;color:#27439a;background:#eef1fb;padding:3px 10px;border-radius:40px;display:inline-flex;align-items:center;gap:4px}
    .empty{text-align:center;padding:30px 10px;color:#8a95bd;font-weight:500}
    .org-search{background:#fff;border-radius:12px;padding:8px 14px;border:1.5px solid #e2e6f0;display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .cal-date-head{font-size:11px;font-weight:800;color:#152854;text-transform:uppercase;letter-spacing:.4px;margin:18px 0 8px;padding-bottom:6px;border-bottom:2px solid #152854;display:flex;justify-content:space-between;align-items:center}
    .cal-date-head:first-child{margin-top:0}
    .cal-date-head.is-today{color:#b06a06;border-bottom-color:#f5a623}
    .cal-date-count{font-size:9.5px;font-weight:700;color:#8a95bd;text-transform:none;letter-spacing:0}
    .cal-event-row{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid #eef1fb;border-radius:11px;padding:10px 12px;margin-bottom:7px;cursor:pointer}
    .cal-event-row:active{background:#f4f6fc}
    .cal-event-time{font-size:11px;font-weight:800;color:#1a306a;background:#eef1fb;padding:5px 8px;border-radius:7px;flex-shrink:0;min-width:58px;text-align:center}
    .cal-event-info{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
    .cal-event-name{font-size:12.5px;font-weight:700;color:#0b1530;line-height:1.3}
    .cal-event-venue{font-size:10.5px;color:#8a95bd;font-weight:600}
    .org-search input{flex:1;border:none;outline:none;font-size:13px;font-weight:500;background:transparent}
    .org-card{background:#fff;border-radius:14px;padding:12px 14px;margin-bottom:10px;border:1px solid #eef1fb}
    .org-card .name{font-weight:800;font-size:13px}
    .org-card .sub{font-size:11px;color:#525d7a;margin:2px 0 8px}
    .org-contact{display:flex;align-items:center;gap:10px;padding:6px 8px;background:#f4f6fc;border-radius:10px;margin-bottom:5px;text-decoration:none;color:inherit}
    .org-contact .avatar{width:28px;height:28px;border-radius:50%;background:#162a5e;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0}
    .org-contact .cname{flex:1;font-weight:600;font-size:12px}
    .org-contact .phone{font-size:11px;font-weight:700;color:#1f9d6c;background:#e8f6ee;padding:3px 10px;border-radius:40px}
    .chip-group{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 12px}
    .chip{font-size:10px;font-weight:700;padding:4px 12px;border-radius:40px;background:#eef1fb;color:#152854;cursor:pointer;border:1px solid transparent}
    .chip.active{background:#0b1530;color:#fff;border-color:#0b1530}
    .btn{width:100%;padding:12px;border-radius:14px;border:none;font-weight:700;font-size:13px;background:#0b1530;color:#fff;cursor:pointer}
    .btn-amber{background:#f5a623;color:#0b1530}
    .btn-small{width:auto;padding:8px 16px;font-size:12px}
    .admin-banner{background:#fff3dc;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#8a5d04;margin-bottom:12px}
    .sheet-overlay{position:fixed;inset:0;background:rgba(11,21,48,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
    .sheet-overlay.open{display:flex}
    .sheet{background:#fff;width:100%;max-width:500px;border-radius:24px 24px 0 0;max-height:88vh;overflow-y:auto;padding:12px 18px 24px;animation:slideup .25s ease}
    @keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    .sheet-handle{width:36px;height:4px;background:#d0d6e8;border-radius:40px;margin:4px auto 10px}
    .sheet-close{float:right;background:#f4f6fc;border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer}
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#0b1530;color:#fff;padding:10px 24px;border-radius:60px;font-weight:700;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:200;opacity:0;pointer-events:none;transition:.2s}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
    .admin-login{position:fixed;bottom:16px;right:16px;background:#f5a623;color:#0b1530;border:none;border-radius:60px;padding:10px 18px;font-weight:800;font-size:12px;box-shadow:0 6px 16px rgba(245,166,35,.3);z-index:50;cursor:pointer;display:flex;align-items:center;gap:6px}
    .login-screen{position:fixed;inset:0;background:rgba(11,21,48,.8);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
    .login-box{background:#fff;border-radius:24px;padding:28px 22px;max-width:320px;width:100%}
    .login-box input{width:100%;padding:12px;border:1.5px solid #e2e6f0;border-radius:12px;font-size:14px;margin:12px 0}
    .login-box .err{color:#d6483d;font-size:12px;font-weight:600}
    .fab{position:fixed;bottom:80px;right:16px;width:50px;height:50px;border-radius:50%;background:#f5a623;color:#0b1530;border:none;box-shadow:0 6px 16px rgba(245,166,35,.3);font-size:24px;z-index:45;display:none;align-items:center;justify-content:center;cursor:pointer}
    .fab.show{display:flex}
    .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .hero-stat{background:#fff;border-radius:16px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.03);border:1px solid #eef1fb;cursor:pointer;transition:transform .1s}
    .hero-stat:active{transform:scale(.96)}
    .hero-stat .num{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;color:#0b1530}
    .hero-stat .lbl{font-size:9px;font-weight:700;color:#525d7a;text-transform:uppercase;letter-spacing:.3px}
    .hero-stat .emoji{font-size:18px;display:block;margin-bottom:2px}
    .fun-fact{background:linear-gradient(135deg,#fef9e7,#fff3dc);border-radius:16px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;border:1px solid #f5dba7}
    .fun-fact .icon{font-size:22px}
    .fun-fact .text{font-size:12px;font-weight:600;color:#7a5d0a}
    .progress-ring{display:flex;align-items:center;gap:16px;background:#fff;border-radius:20px;padding:14px 16px;border:1px solid #eef1fb;margin-bottom:16px}
    .breakdown-card{background:#fff;border-radius:20px;padding:14px 14px 16px;border:1px solid #eef1fb;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.03)}
    .breakdown-title{font-size:11.5px;font-weight:800;color:#0b1530;text-transform:uppercase;letter-spacing:.4px;margin-bottom:11px;display:flex;align-items:center;gap:6px}
    .breakdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .breakdown-tile{border-radius:14px;padding:11px 6px;text-align:center;cursor:pointer;transition:transform .1s;border:1px solid transparent}
    .breakdown-tile:active{transform:scale(.95)}
    .breakdown-tile .icon{font-size:20px;display:block;margin-bottom:3px}
    .breakdown-tile .num{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;line-height:1}
    .breakdown-tile .lbl{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
    .breakdown-tile.men{background:linear-gradient(155deg,#eaf1ff,#dce8ff);border-color:#c7d9ff}
    .breakdown-tile.men .num,.breakdown-tile.men .lbl{color:#1a4fc4}
    .breakdown-tile.women{background:linear-gradient(155deg,#ffeef5,#ffe0ed);border-color:#ffc9de}
    .breakdown-tile.women .num,.breakdown-tile.women .lbl{color:#c4257a}
    .breakdown-tile.children{background:linear-gradient(155deg,#fff8e0,#fff0c2);border-color:#ffe89e}
    .breakdown-tile.children .num,.breakdown-tile.children .lbl{color:#9a7000}
    .breakdown-tile.open{background:linear-gradient(155deg,#eafaf0,#dcf5e6);border-color:#bdeccf}
    .breakdown-tile.open .num,.breakdown-tile.open .lbl{color:#1f9d6c}
    .breakdown-bar{height:9px;border-radius:6px;overflow:hidden;display:flex;background:#f0f3fa}
    .breakdown-bar span{height:100%;transition:width .6s ease}
    .breakdown-bar .seg-men{background:#4c7cf0}
    .breakdown-bar .seg-women{background:#ec5a96}
    .breakdown-bar .seg-children{background:#f5c518}
    .breakdown-bar .seg-open{background:#2bbd7e}
    .ring{position:relative;width:60px;height:60px;flex-shrink:0}
    .ring svg{transform:rotate(-90deg);width:60px;height:60px}
    .ring .bg{fill:none;stroke:#eef1fb;stroke-width:6}
    .ring .fg{fill:none;stroke:#f5a623;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s}
    .ring .center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:#0b1530}
    .ring .center small{font-size:9px;font-weight:600;color:#525d7a;margin-left:1px}
    .ring-text{flex:1}
    .ring-text .pct{font-size:13px;font-weight:800}
    .ring-text .sub{font-size:10px;color:#525d7a;font-weight:600}
    .winner-btn.active{background:#f5a623!important;color:#0b1530;border-color:#f5a623!important}
    .participant-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f3fa}
    .participant-row:last-child{border-bottom:none}
    .participant-row .pname{font-weight:600;font-size:13px}
    .participant-row .pphone{font-size:11px;color:#525d7a}
    .remove-btn{background:none;border:none;color:#d6483d;cursor:pointer;font-size:16px;padding:0 4px}
    .category-group{background:#fff;border-radius:20px;padding:0;margin-bottom:16px;border:1px solid #eef1fb;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.03)}
    .category-header{background:linear-gradient(135deg,#f8f9fd,#eef1fb);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e6f0;cursor:pointer;transition:background .15s}
    .category-header:active{background:#e8ebf5}
    .category-header .cat-name{font-weight:800;font-size:14px;color:#0b1530;display:flex;align-items:center;gap:8px}
    .category-header .cat-count{font-size:11px;font-weight:600;color:#525d7a;background:#fff;padding:2px 12px;border-radius:40px}
    .category-header .cat-arrow{transition:transform .25s;color:#525d7a;font-size:14px}
    .category-header .cat-arrow.open{transform:rotate(180deg)}
    .category-body{padding:0 12px 12px}
    .category-body .card{margin-bottom:8px;border:1px solid #f0f3fa;box-shadow:none}
    .category-body .card:last-child{margin-bottom:0}
    .event-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .event-sq{background:#fff;border:1px solid #f0f3fa;border-radius:14px;padding:10px 10px 9px;cursor:pointer;display:flex;flex-direction:column;gap:5px;min-height:108px;transition:.15s}
    .event-sq:active{transform:scale(.97);background:#f8f9fd}
    .event-sq .sq-icon{font-size:20px;line-height:1}
    .event-sq .sq-name{font-size:11.5px;font-weight:800;color:#0b1530;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .event-sq .sq-meta{font-size:9.5px;color:#8a95bd;font-weight:600;display:flex;align-items:center;gap:3px;margin-top:auto}
    .event-sq .sq-status{font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:40px;align-self:flex-start}
    .event-sq .sq-status.upcoming{background:#eef1fb;color:#152854}
    .event-sq .sq-status.live{background:#fff0db;color:#b06a06}
    .event-sq .sq-status.completed{background:#e8f6ee;color:#1f9d6c}
    .event-sq .sq-status.postponed{background:#fdf0e8;color:#9a5a1f}
    .event-sq.today{border-color:#f5a623;box-shadow:0 0 0 1px #f5a623 inset}
    .sync-indicator{display:flex;align-items:center;gap:4px;font-size:8px;color:#9aa6cc;font-weight:600}
    .sync-indicator .spinner{width:10px;height:10px;border:2px solid rgba(255,255,255,.1);border-top-color:#f5a623;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .click-hint{font-size:8px;color:#9aa6cc;margin-top:4px;display:flex;align-items:center;gap:3px}
    .click-hint svg{width:10px;height:10px}
    .footer{text-align:center;padding:20px 0 6px;font-size:10px;color:#aab4d6;font-weight:600;border-top:1px solid #e2e6f0;margin-top:10px}
    .footer b{color:#525d7a;font-weight:700}
    .footer .dev{color:#27439a}
    .today-badge{background:#f5a623;color:#0b1530;font-size:8px;padding:2px 8px;border-radius:40px;font-weight:800;margin-left:4px}
    /* Fix for participant add button */
    .participant-add-row{display:flex;gap:6px;margin:6px 0;flex-wrap:nowrap}
    .participant-add-row input{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #e2e6f0;font-size:12px;min-width:0}
    .participant-add-row input:first-child{flex:2}
    .participant-add-row .btn-add-part{width:auto;padding:8px 16px;font-size:12px;background:#f5a623;color:#0b1530;border:none;border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .score-edit-row{display:flex;gap:8px;margin:6px 0;flex-wrap:wrap}
    .score-edit-row input{flex:1;min-width:80px;padding:8px;border-radius:8px;border:1px solid #e2e6f0;font-size:13px}
    .score-edit-row .vs-divider{display:flex;align-items:center;font-weight:700;color:#8390bb;padding:0 4px}
    .winner-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .winner-btns .winner-btn{padding:6px 12px;border-radius:40px;border:1.5px solid #e2e6f0;background:#fff;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s}
    .winner-btns .winner-btn.active{background:#f5a623!important;color:#0b1530;border-color:#f5a623!important}
    .status-action-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
    .status-action-row .btn{flex:1;min-width:80px;padding:8px;font-size:11px}
    @media (min-width:600px){.app{max-width:600px}}
  </style>
</head>
<body>
<div class="app" id="app">

  <div class="header">

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500); }

function normalizeDate(v){
  if(!v) return '';
  if(typeof v === 'string'){
    const m = v.match(/^(\d{4}-\d{2}-\d{2})/);
    if(m) return m[1];
    return v;
  }
  if(v instanceof Date || Object.prototype.toString.call(v) === '[object Date]'){
    const d = new Date(v);
    if(isNaN(d.getTime())) return '';
    return d.toISOString().slice(0,10);
  }
  return String(v);
}

function updateEventStatuses(events){
  return events.map(e => {
    if(e.status === 'completed' || e.status === 'postponed') return e;
    const eventDate = e.date;

    if(eventDate < TODAY_STR){
      return {...e, status: 'completed'};
    } else if(eventDate === TODAY_STR){
      return {...e, status: 'live'};
    }
    return e;
  });
}

async function backendGetAll(){
  if(USE_LOCAL_FALLBACK) throw new Error("Local fallback mode");
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    const res = await fetch(BACKEND_URL + "?action=getAll", { method: "GET", signal: controller.signal, headers: { 'Accept': 'application/json' } });
    clearTimeout(timeoutId);
    if(!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  }catch(e){
    if(e.name === 'AbortError') throw new Error("Connection timeout");
    throw new Error("Backend unreachable: " + e.message);
  }
}

async function backendSave(action, data){
  if(USE_LOCAL_FALLBACK) throw new Error("Local fallback mode");
  try{
    const body = new URLSearchParams();
    body.set("action", action);
    body.set("data", JSON.stringify(data));
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    const res = await fetch(BACKEND_URL, { method: "POST", body: body, signal: controller.signal, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
    clearTimeout(timeoutId);
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    return json;
  }catch(e){
    if(e.name === 'AbortError') throw new Error("Connection timeout");
    throw new Error("Save failed: " + e.message);
  }
}

      let events = (data.events && data.events.length) ? rowsToEvents(data.events) : null;
      if(!events){ events = getSeedEvents(); }
      events = updateEventStatuses(events);
      state.events = events;
      let notifs = (data.notifications && data.notifications.length) ? rowsToNotifs(data.notifications) : null;
      if(!notifs){ notifs = SEED_NOTIFS; }
      state.notifications = notifs;
    } else {
      state.events = getSeedEvents();
      state.notifications = SEED_NOTIFS;
      backendOk = false;
    }
    if(state.notifications.length > lastSeenNotif){ hasUnreadNotif = true; updateBellDot(); }
    updateConnectionDot();
    return true;
  }catch(e){
    console.warn('Using local data -', e.message);
    backendOk = false;
    if(!state.events || !state.events.length){ state.events = getSeedEvents(); }
    if(!state.notifications || !state.notifications.length){ state.notifications = SEED_NOTIFS; }
    updateConnectionDot();
    return false;
  }
}

async function saveEvents(){
  if(isSaving) return false;
  if(USE_LOCAL_FALLBACK || !backendOk){ toast('💾 Offline — saved locally'); return true; }
  isSaving = true;
  document.getElementById('syncIndicator').innerHTML = '<span class="spinner"></span> saving…';
  try{
    await backendSave('saveEvents', eventsToRows(state.events));
    backendOk = true;
    toast('✅ Synced to sheet');
    updateConnectionDot();
    return true;
  }catch(e){
    backendOk = false;
    toast('⚠️ Offline — saved locally');
    updateConnectionDot();
    return false;
  }finally{
    isSaving = false;
    document.getElementById('syncIndicator').innerHTML = '<span class="spinner"></span>sync';
  }
}

async function saveNotifs(){
  if(USE_LOCAL_FALLBACK || !backendOk) return true;
  try{
    await backendSave('saveNotifications', state.notifications);
    backendOk = true;
    updateConnectionDot();
    return true;
  }catch(e){
    backendOk = false;
    updateConnectionDot();
    return false;
  }
}

function updateConnectionDot(){

function updateBellDot(){

function renderTicker(){
  const el=document.getElementById('marqueeText');
  if(!el) return;
  const parts = [];

  const live = state.events.find(e=>e.status==='live');
  if(live){
    parts.push(`🔴 LIVE NOW: ${live.name} · ${fmtDate(live.date)}`);
  }else{
    const up = state.events.filter(e=>e.status==='upcoming').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
    if(up.length) parts.push(`📅 UP NEXT: ${up[0].name} · ${fmtDate(up[0].date)} ${up[0].time || 'TBA'}`);
    else parts.push('✅ All events completed · 57th Foundation Day');
  }

  const todaysEvents = state.events.filter(e=>isToday(e.date) && e.status !== 'postponed');
  if(todaysEvents.length){
    const names = todaysEvents.slice(0,4).map(e=>e.name).join(', ');
    parts.push(`🔥 TODAY'S EVENTS: ${names}${todaysEvents.length>4 ? ` +${todaysEvents.length-4} more` : ''}`);
  }

  const postponedToday = state.events.filter(e=>e.status==='postponed');
  if(postponedToday.length){
    const names = postponedToday.slice(0,3).map(e=>e.name).join(', ');
    parts.push(`⏸ POSTPONED: ${names}`);
  }

  const joined = parts.map(p=>escapeHtml(p)).join('<span class="sep">★</span>');
  el.innerHTML = joined + '<span class="sep">★</span>' + joined;

  const plainLength = parts.join(' ★ ').length;
  const durationSeconds = Math.max(16, Math.round(plainLength / 9));
  el.style.animationDuration = durationSeconds + 's';
}

function isToday(dateStr){ return dateStr === TODAY_STR; }

// Icon mapping for categories and individual games
const CATEGORY_ICONS = {
  'Indoor Games': '🎲',
  'Outdoor Games': '🏃',
  'Athletics': '🏃‍♂️',
  "Women's Events": '👩',
  "Children's Events": '🧒',
  'Cultural': '🎭',
  'Cricket': '🏏'
};
function getCategoryIcon(cat){ return CATEGORY_ICONS[cat] || '📂'; }

function getEventIcon(name){
  const n = (name||'').toLowerCase();
  if(/carrom/.test(n)) return '🎯';
  if(/chess/.test(n)) return '♟️';
  if(/jackpot|cards/.test(n)) return '🃏';
  if(/table tennis|t\.t\./.test(n)) return '🏓';
  if(/badminton/.test(n)) return '🏸';
  if(/tennis ball cricket|cricket/.test(n)) return '🏏';
  if(/kabaddi/.test(n)) return '🤼';
  if(/cross-country|run|walk|100m|200m|30m|50m|marathon/.test(n)) return '🏃';
  if(/shot put/.test(n)) return '⚪';
  if(/discus/.test(n)) return '🥏';
  if(/javelin/.test(n)) return '🔱';
  if(/volleyball/.test(n)) return '🏐';
  if(/lemon\s*&?\s*spoon/.test(n)) return '🥄';
  if(/frog jump/.test(n)) return '🐸';
  if(/karaoke|light music/.test(n)) return '🎤';
  if(/quiz/.test(n)) return '🧠';
  if(/rangoli/.test(n)) return '🎨';
  return '🏅';
}

function genderGroup(e){
  if(e.category === "Children's Events") return 'children';
  if(e.category === "Women's Events") return 'women';
  if(/\bWomen\b|\bGirls\b/i.test(e.name)) return 'women';
  if(/\bMen\b/i.test(e.name) && !/\bWomen\b/i.test(e.name)) return 'men';
  return 'open';
}

function eventSquareHtml(e){
  const isTodayEvent = isToday(e.date);
  const statusLabel = e.status==='live' ? 'LIVE' : e.status==='completed' ? 'DONE' : e.status==='postponed' ? 'POSTPONED' : 'UPCOMING';
  return `<div class="card event-sq ${isTodayEvent?'today':''}" data-id="${e.id}">
    <div class="sq-icon">${getEventIcon(e.name)}</div>
    <div class="sq-name">${escapeHtml(e.name)}</div>
    <span class="sq-status ${e.status}">${statusLabel}</span>
    <div class="sq-meta">📅 ${fmtDate(e.date)}</div>
  </div>`;
}

function eventCardHtml(e, clickable=true){
  const pCount = (e.participants||[]).length;
  const isTodayEvent = isToday(e.date);
  let scoreHtml = '';
  if(e.teamA && e.teamB && (e.scoreA || e.scoreB || e.winner)){
    const aW=e.winner==='A', bW=e.winner==='B', tie=e.winner==='tie';
    scoreHtml = `<div class="scorecard">
      <div class="sc-row"><span class="sc-team">${aW?'🏆 ':''}${escapeHtml(e.teamA)}</span><span class="sc-runs">${escapeHtml(e.scoreA||'—')}</span></div>
      <div class="sc-vs">vs</div>
      <div class="sc-row"><span class="sc-team">${bW?'🏆 ':''}${escapeHtml(e.teamB)}</span><span class="sc-runs">${escapeHtml(e.scoreB||'—')}</span></div>
      ${e.winner?`<div class="sc-result">${tie?'🤝 Match Tied':`🏆 ${escapeHtml(aW?e.teamA:e.teamB)} won`}</div>`:''}
    </div>`;
  }
  const clickHint = (e.category==='Cricket' && clickable) ? `<div class="click-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg> tap for details</div>` : '';

  const statusLabel = e.status==='live' ? '🔴 LIVE' : e.status==='completed' ? '✅ DONE' : e.status==='postponed' ? '⏸ POSTPONED' : '📅 UPCOMING';
  return `<div class="card ${e.category==='Cricket'?'card-cricket':''}" data-id="${e.id}">
    <div class="card-header"><div><div class="card-title">${getEventIcon(e.name)} ${escapeHtml(e.name)} ${todayBadge}</div><div class="card-cat">${escapeHtml(e.category)}</div></div>
    <span class="status ${e.status}">${statusLabel}</span></div>
    <div class="meta"><span>📅 ${fmtDate(e.date)}</span><span>⏱ ${escapeHtml(e.time)||'TBA'}</span><span>📍 ${escapeHtml(e.venue)}</span></div>
    ${scoreHtml}
    <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
      <span class="participant-pill">👤 ${pCount} registered</span>

}

    btn.textContent = 'Applying…';
    btn.disabled = true;
    const seedById = {};
    SEED_EVENTS.forEach(s => seedById[s.id] = s);
    let changed = 0;
    state.events = state.events.map(ev=>{
      const seed = seedById[ev.id];
      if(!seed) return ev;
      const updated = {...ev};
      if(seed.venue && seed.venue !== ev.venue){ updated.venue = seed.venue; changed++; }
      if(seed.name && seed.name !== ev.name){ updated.name = seed.name; changed++; }
      return updated;
    });
    if(changed > 0){
      await saveEvents();
      toast(`✅ Applied ${changed} correction(s) — synced to all employees`);

      toast('Already up to date — no corrections needed');
    }

    btn.disabled = false;
    renderDashboard();
  });
  bindCards();
  renderTicker();
}

function renderEvents(){
  const c=document.getElementById('content');

  let filtered = activeFilter==='all' ? state.events.filter(e=>e.category!=='Cricket') : state.events.filter(e=>e.category===activeFilter);
  filtered = filtered.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));

  let html = `<div class="chip-group">`;
  cats.forEach(cat=>{ html+=`<span class="chip ${activeFilter===cat?'active':''}" data-cat="${cat}">${cat==='all'?'🏆 All':getCategoryIcon(cat)+' '+cat}</span>`; });
  html+=`</div>`;

  if(!filtered.length){ html+=`<div class="empty">No events in this category</div>`; }
  else {
    const grouped = {};
    filtered.forEach(e=>{ if(!grouped[e.category]) grouped[e.category] = []; grouped[e.category].push(e); });
    Object.keys(grouped).forEach(cat=>{
      if(categoryState[cat] === undefined) categoryState[cat] = true;
      const isOpen = categoryState[cat];
      html+=`<div class="category-group">
        <div class="category-header" data-cat="${cat}">
          <span class="cat-name">${getCategoryIcon(cat)} ${cat}</span>

          </div>
        </div>
        <div class="category-body" style="display:${isOpen?'block':'none'}">
          <div class="event-grid">${grouped[cat].map(e=>eventSquareHtml(e)).join('')}</div>
        </div>
      </div>`;
    });
  }

  c.innerHTML=html;
  document.querySelectorAll('.category-header').forEach(el=>{
    el.onclick=()=>{
      const cat = el.dataset.cat;
      categoryState[cat] = !categoryState[cat];
      const body = el.nextElementSibling;
      body.style.display = categoryState[cat] ? 'block' : 'none';
      el.querySelector('.cat-arrow').classList.toggle('open');
    };
  });
  document.querySelectorAll('.chip').forEach(el=>{ el.onclick=()=>{ activeFilter=el.dataset.cat; renderEvents(); }; });
  bindCards(); renderTicker();
}

  document.querySelectorAll('.card[data-id]').forEach(el=>{
    el.onclick = ()=>{
      document.getElementById('sheetOverlay').classList.remove('open');
      setTimeout(()=>openSheet(el.dataset.id), 200);
    };
  });
}

function openTodaySheet(){
  const sheet = document.getElementById('sheet');
  const todaysEvents = state.events.filter(e=>isToday(e.date) && e.status !== 'postponed').sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  let html = `<div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="font-size:17px">🔥 Today's Events</h3>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>
    <div style="font-size:11.5px;color:#525d7a;margin:4px 0 14px;">${fmtDate(TODAY_STR)} · ${todaysEvents.length} event${todaysEvents.length!==1?'s':''} scheduled</div>`;

  if(todaysEvents.length === 0){
    html += `<div style="text-align:center;padding:30px 10px;color:#8a95bd;font-size:13px;">No events scheduled for today.</div>`;
  }else{
    todaysEvents.forEach(e=>html += eventCardHtml(e, true));
  }

  sheet.innerHTML = html;
  document.getElementById('sheetClose').onclick = ()=>document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheetOverlay').classList.add('open');
  document.querySelectorAll('.card[data-id]').forEach(el=>{
    el.onclick = ()=>{
      document.getElementById('sheetOverlay').classList.remove('open');
      setTimeout(()=>openSheet(el.dataset.id), 200);
    };
  });
}

function openCalendarSheet(){
  const sheet = document.getElementById('sheet');
  const withDates = state.events.filter(e=>e.date).slice().sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  const grouped = {};
  withDates.forEach(e=>{ (grouped[e.date] = grouped[e.date]||[]).push(e); });
  const dates = Object.keys(grouped).sort();

  let html = `<div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="font-size:17px">📅 Event Calendar</h3>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>
    <div style="font-size:11.5px;color:#525d7a;margin:4px 0 14px;">${dates.length} day(s) scheduled · sorted by date</div>`;

  if(dates.length === 0){
    html += `<div style="text-align:center;padding:30px 10px;color:#8a95bd;font-size:13px;">No scheduled events yet.</div>`;
  }else{
    dates.forEach(d=>{
      const dayEvents = grouped[d];
      const todayFlag = d === TODAY_STR;
      html += `<div class="cal-date-head ${todayFlag?'is-today':''}">
        ${todayFlag ? '🔥 TODAY · ' : ''}${fmtDate(d)}
        <span class="cal-date-count">${dayEvents.length} event${dayEvents.length>1?'s':''}</span>
      </div>`;
      dayEvents.forEach(e=>{
        const statusEmoji = e.status==='live'?'🔴':e.status==='completed'?'✅':e.status==='postponed'?'⏸':'📅';
        html += `<div class="cal-event-row" data-id="${e.id}">
          <span class="cal-event-time">${escapeHtml(e.time)||'TBA'}</span>
          <span class="cal-event-info">
            <span class="cal-event-name">${statusEmoji} ${escapeHtml(e.name)}</span>
            <span class="cal-event-venue">${escapeHtml(e.venue)}</span>
          </span>
        </div>`;
      });
    });
  }

  sheet.innerHTML = html;
  document.getElementById('sheetClose').onclick = ()=>document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheetOverlay').classList.add('open');
  document.querySelectorAll('.cal-event-row').forEach(row=>{
    row.onclick = ()=>{
      document.getElementById('sheetOverlay').classList.remove('open');
      setTimeout(()=>openSheet(row.dataset.id), 200);
    };
  });
}

function renderOrganisers(){
  const c=document.getElementById('content');
  const withCoords=state.events.filter(e=>e.coordinators&&e.coordinators.length);
  let html=`<div class="section-title">📞 Organisers & Contacts <small>${withCoords.reduce((s,e)=>s+(e.coordinators||[]).length,0)} contacts</small></div>
  <div class="org-search"><input type="text" id="orgSearch" placeholder="Search by sport, event, name..."></div>`;
  const q=(document.getElementById('orgSearch')||{value:''}).value.trim().toLowerCase();
  const filtered=withCoords.filter(e=>{
    if(e.name.toLowerCase().includes(q)||e.category.toLowerCase().includes(q)) return true;
    return (e.coordinators||[]).some(c=>c.name.toLowerCase().includes(q)||(c.phone||'').includes(q));
  });
  if(!filtered.length) html+=`<div class="empty">No matches</div>`;
  else filtered.forEach(e=>{
    html+=`<div class="org-card"><div class="name">${escapeHtml(e.name)}</div><div class="sub">${escapeHtml(e.category)} · ${fmtDate(e.date)}</div>`;
    e.coordinators.forEach(c=>{
      html+=`<a class="org-contact" href="tel:${escapeHtml(c.phone)}"><span class="avatar">${initials(c.name)}</span><span class="cname">${escapeHtml(c.name)}</span><span class="phone">${escapeHtml(c.phone)}</span></a>`;
    });
    html+=`</div>`;
  });
  c.innerHTML=html;
  const searchInput = document.getElementById('orgSearch');
  if(searchInput){
    searchInput.value = q;
    searchInput.oninput = (e)=>{
      const cursorPos = e.target.selectionStart;
      renderOrganisers();
      const newInput = document.getElementById('orgSearch');
      if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
    };
  }
  renderTicker();
}

// Alerts
function renderAlerts(){
  const c=document.getElementById('content');
  markNotifsRead();
  
  let html=`<div class="section-title">🔔 Alerts <small>${state.notifications.length}</small></div>`;
  if(isAdmin){
    html+=`<div style="background:#fff;border-radius:14px;padding:12px;border:1px solid #eef1fb;margin-bottom:12px">
      <input id="notifTitle" placeholder="Title" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin-bottom:6px">
      <textarea id="notifMsg" rows="2" placeholder="Message" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin-bottom:6px"></textarea>
      <button class="btn btn-amber" id="sendNotifBtn">📢 Send broadcast</button>
    </div>`;
  }
  state.notifications.slice().sort((a,b)=>b.time-a.time).forEach(n=>{
    html+=`<div style="background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:8px;border-left:4px solid ${n.type==='alert'?'#f5a623':'#27439a'}">
      <div style="font-weight:800;font-size:13px">${escapeHtml(n.title)}</div>
      <div style="font-size:12px;color:#525d7a;margin:2px 0">${escapeHtml(n.message)}</div>
      <div style="font-size:10px;color:#9aa6cc">${new Date(n.time).toLocaleString()}</div>
    </div>`;
  });
  c.innerHTML=html;
  if(isAdmin) document.getElementById('sendNotifBtn')?.addEventListener('click', async ()=>{
    const title=document.getElementById('notifTitle').value.trim();
    const msg=document.getElementById('notifMsg').value.trim();
    if(!title||!msg) return toast('Fill title and message');
    state.notifications.push({id:uid('n'),title,message:msg,type:'info',time:Date.now()});
    await saveNotifs();
    hasUnreadNotif = true;
    updateBellDot();
    toast('Broadcast sent ✓');
    renderAlerts();
  });
  renderTicker();
}

function bindCards(){
  document.querySelectorAll('.card[data-id]').forEach(el=>{ el.onclick=()=>openSheet(el.dataset.id); });
}

// OPEN SHEET - FIXED: Score update and participant add now work properly
function openSheet(id){
  const ev = state.events.find(e=>e.id===id);
  if(!ev) return;
  if(!ev.participants) ev.participants = [];
  const participants = ev.participants;
  
  const sheet = document.getElementById('sheet');
  let html = `<div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h3 style="font-size:17px">${escapeHtml(ev.name)}</h3>
      <button class="sheet-close" id="sheetClose">✕</button>
    </div>
    <div style="margin:6px 0 8px"><span class="status ${ev.status}">${ev.status}</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;background:#f4f6fc;border-radius:12px;padding:10px">
      <div><span style="color:#525d7a">Category</span><br><strong>${escapeHtml(ev.category)}</strong></div>
      <div><span style="color:#525d7a">Venue</span><br><strong>${escapeHtml(ev.venue)}</strong></div>
      <div><span style="color:#525d7a">Date</span><br><strong>${fmtDate(ev.date)}</strong></div>
      <div><span style="color:#525d7a">Time</span><br><strong>${escapeHtml(ev.time)||'TBA'}</strong></div>
    </div>`;

  if(ev.status === 'postponed' && ev.postponedNote){
    html += `<div style="margin-top:10px;background:#fdf0e8;border:1px solid #f0c9a8;border-radius:10px;padding:9px 12px;font-size:11.5px;color:#9a5a1f;font-weight:600;">⏸ ${escapeHtml(ev.postponedNote)}</div>`;
  }

  if(isAdmin){
    html += `<div style="margin-top:14px;font-weight:700;font-size:12px">📌 Event Status</div>
      <div class="status-set-row">
        <button class="status-set-btn ${ev.status==='upcoming'?'active':''}" data-set-status="upcoming">📅 Upcoming</button>
        <button class="status-set-btn ${ev.status==='live'?'active':''}" data-set-status="live">🔴 Live</button>
        <button class="status-set-btn ${ev.status==='completed'?'active':''}" data-set-status="completed">✅ Completed</button>
        <button class="status-set-btn postponed ${ev.status==='postponed'?'active':''}" data-set-status="postponed">⏸ Postponed</button>
      </div>
      <div id="postponeNoteWrap" style="display:${ev.status==='postponed'?'block':'none'};margin-top:8px;">
        <input id="postponeNoteInput" placeholder="Reason / new date (optional)" value="${escapeHtml(ev.postponedNote||'')}" style="width:100%;border:1.5px solid #e2e6f0;border-radius:9px;padding:9px 11px;font-size:12.5px;font-family:inherit;box-sizing:border-box;">
      </div>
      <button class="btn" id="saveStatusBtn" style="background:#0b1530;color:#fff;margin-top:8px;">Save status</button>`;
  }
  
  // PARTICIPANTS SECTION - Fixed layout
  html += `<div style="margin-top:12px;font-weight:700;font-size:12px">👥 Participants <small style="font-weight:400;color:#525d7a">${participants.length}</small></div>`;
  
  // Participant list
  if(participants.length){
    participants.forEach((p, idx)=>{
      html += `<div class="participant-row">
        <div><div class="pname">${escapeHtml(p.name)}</div>${p.phone ? `<div class="pphone">${escapeHtml(p.phone)}</div>` : ''}</div>
        ${isAdmin ? `<button class="remove-btn" data-idx="${idx}" title="Remove">✕</button>` : ''}
      </div>`;
    });
  } else {
    html += `<div style="font-size:12px;color:#8a95bd;padding:4px 0">No participants registered yet</div>`;
  }
  
  // ADD PARTICIPANT - Fixed: full width, button visible
  if(isAdmin){
    html += `<div class="participant-add-row">
      <input id="partName" placeholder="Name">
      <input id="partPhone" placeholder="Phone">
      <button class="btn-add-part" id="addPartBtn">+ Add</button>
    </div>`;
  }

  // CRICKET SCORE EDITOR - Fixed: proper layout and save
  if(isAdmin && ev.teamA && ev.teamB){
    html += `<div style="margin-top:14px;font-weight:700;font-size:12px">✎ Update Score & Winner</div>
      <div class="score-edit-row">
        <input id="scA" placeholder="${escapeHtml(ev.teamA)} score" value="${escapeHtml(ev.scoreA||'')}">
        <span class="vs-divider">VS</span>
        <input id="scB" placeholder="${escapeHtml(ev.teamB)} score" value="${escapeHtml(ev.scoreB||'')}">
      </div>
      <div class="winner-btns">
        <button class="winner-btn ${ev.winner==='A'?'active':''}" data-win="A">🏆 ${escapeHtml(ev.teamA)}</button>
        <button class="winner-btn ${ev.winner==='B'?'active':''}" data-win="B">🏆 ${escapeHtml(ev.teamB)}</button>
        <button class="winner-btn ${ev.winner==='tie'?'active':''}" data-win="tie">🤝 Tie</button>
        <button class="winner-btn ${!ev.winner?'active':''}" data-win="">—</button>
      </div>
      <button class="btn" id="updateScoreBtn" style="background:#f5a623;color:#0b1530;">Update Score</button>`;
  }
  
  // Coordinators
  if(ev.coordinators && ev.coordinators.length){
    html += `<div style="margin-top:12px;font-weight:700;font-size:12px">📞 Coordinators</div>`;
    ev.coordinators.forEach(c=>{
      html += `<a href="tel:${escapeHtml(c.phone)}" style="display:flex;justify-content:space-between;background:#f4f6fc;padding:6px 10px;border-radius:8px;margin-top:4px;text-decoration:none;color:inherit">
        <span>${escapeHtml(c.name)}</span><span style="color:#1f9d6c">${escapeHtml(c.phone)}</span>
      </a>`;
    });
  }
  sheet.innerHTML = html;
  document.getElementById('sheetClose').onclick = ()=>document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('sheetOverlay').classList.add('open');

  // ADD PARTICIPANT - Fixed: saves properly
  if(isAdmin){
    const addBtn = document.getElementById('addPartBtn');
    if(addBtn){
      addBtn.onclick = async ()=>{
        const name = document.getElementById('partName').value.trim();
        const phone = document.getElementById('partPhone').value.trim();
        if(!name) return toast('Enter a name');
        ev.participants.push({name, phone});
        await saveEvents();
        toast('✅ Participant added');
        openSheet(id);
        renderCurrentTab();
      };
    }
    document.querySelectorAll('.remove-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = parseInt(btn.dataset.idx, 10);
        ev.participants.splice(idx, 1);
        await saveEvents();
        toast('✅ Participant removed');
        openSheet(id);
        renderCurrentTab();
      };
    });
  }

  // SCORE UPDATE - Fixed: properly saves scores and winner
  if(isAdmin && ev.teamA && ev.teamB){
    document.querySelectorAll('.winner-btn').forEach(b=>{
      b.onclick = ()=>{
        document.querySelectorAll('.winner-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        ev.winner = b.dataset.win;
      };
    });
    
    const updateBtn = document.getElementById('updateScoreBtn');
    if(updateBtn){
      updateBtn.onclick = async ()=>{
        const scA = document.getElementById('scA').value.trim();
        const scB = document.getElementById('scB').value.trim();
        ev.scoreA = scA;
        ev.scoreB = scB;
        // Winner is already set via the button clicks above
        await saveEvents();
        toast('✅ Score updated');
        document.getElementById('sheetOverlay').classList.remove('open');
        renderCurrentTab();
      };
    }
  }

  if(isAdmin){
    let pendingStatus = ev.status;
    document.querySelectorAll('.status-set-btn').forEach(b=>{
      b.onclick = ()=>{
        document.querySelectorAll('.status-set-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        pendingStatus = b.dataset.setStatus;
        const noteWrap = document.getElementById('postponeNoteWrap');
        if(noteWrap) noteWrap.style.display = pendingStatus === 'postponed' ? 'block' : 'none';
      };
    });
    const saveStatusBtn = document.getElementById('saveStatusBtn');
    if(saveStatusBtn){
      saveStatusBtn.onclick = async ()=>{
        ev.status = pendingStatus;
        if(pendingStatus === 'postponed'){
          const noteInput = document.getElementById('postponeNoteInput');
          ev.postponedNote = noteInput ? noteInput.value.trim() : '';
        }else{
          ev.postponedNote = '';
        }
        await saveEvents();
        toast(pendingStatus === 'postponed' ? '⏸ Marked as postponed' : '✅ Status updated');
        document.getElementById('sheetOverlay').classList.remove('open');
        renderCurrentTab();
      };
    }
  }
}

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('fabAdd').classList.toggle('show', isAdmin && (tab==='events'||tab==='cricket'));
  if(tab==='dashboard') renderDashboard();
  else if(tab==='events') renderEvents();
  else if(tab==='cricket') renderCricket();
  else if(tab==='organisers') renderOrganisers();
  else if(tab==='alerts') renderAlerts();
}

document.querySelectorAll('.tab').forEach(el=>el.onclick=()=>setTab(el.dataset.tab));
document.getElementById('calendarBtn').onclick=()=>openCalendarSheet();
document.getElementById('bellBtn').onclick=()=>{ setTab('alerts'); markNotifsRead(); };

document.getElementById('adminToggleBtn').onclick=()=>{
  if(isAdmin){ isAdmin=false; toast('Switched to employee view'); renderCurrentTab(); return; }
  document.getElementById('loginScreen').style.display='flex';
};
document.getElementById('loginCancel').onclick=()=>document.getElementById('loginScreen').style.display='none';
document.getElementById('loginSubmit').onclick=()=>{
  if(document.getElementById('adminPw').value===ADMIN_PW){ isAdmin=true; document.getElementById('loginScreen').style.display='none'; toast('Admin mode'); renderCurrentTab(); }
  else document.getElementById('loginErr').style.display='block';
};
document.getElementById('adminPw').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('loginSubmit').click(); });

document.getElementById('fabAdd').onclick=()=>{
  const sheet=document.getElementById('sheet');
  sheet.innerHTML=`<div class="sheet-handle"></div><h3 style="font-size:17px">Add Event</h3>
  <input id="neName" placeholder="Event name" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin:6px 0">
  <input id="neCat" placeholder="Category" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin:6px 0">
  <div style="display:flex;gap:6px"><input id="neDate" type="date" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e2e6f0"><input id="neTime" placeholder="Time" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e2e6f0"></div>
  <input id="neVenue" placeholder="Venue" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e2e6f0;margin:6px 0">
  <button class="btn" id="neSave">Create</button>
  <button class="btn" style="background:#f4f6fc;color:#0b1530;margin-top:6px" id="neCancel">Cancel</button>`;
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('neCancel').onclick=()=>document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('neSave').onclick=async ()=>{
    const name=document.getElementById('neName').value.trim();
    if(!name) return toast('Enter name');
    state.events.push({id:uid('ev'),name,category:document.getElementById('neCat').value.trim()||'General',venue:document.getElementById('neVenue').value.trim()||'BTPS',date:document.getElementById('neDate').value||'2026-07-20',time:document.getElementById('neTime').value.trim()||'TBA',status:'upcoming',participants:[],coordinators:[]});
    await saveEvents();
    toast('Event added ✓');
    document.getElementById('sheetOverlay').classList.remove('open');
    renderCurrentTab();
  };
};

function renderCurrentTab(){ setTab(currentTab); }

async function init(){
  await loadState();
  renderCurrentTab();
  setInterval(async ()=>{
    if(!isSaving && !USE_LOCAL_FALLBACK){
      const prevNotifLen = state.notifications.length;
      await loadState();
      if(state.notifications.length > prevNotifLen){ hasUnreadNotif = true; updateBellDot(); }
      if(!document.getElementById('sheetOverlay').classList.contains('open')){ renderCurrentTab(); }
    }
  }, 60000);
}
init();

})();
</script>
