<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>57th Foundation Day Sports Events at BTPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0b1530;
    --navy-900:#0f1d3f;
    --navy-800:#152854;
    --navy-700:#1c3470;
    --navy-600:#27439a;
    --amber-500:#f5a623;
    --amber-400:#ffc24d;
    --amber-100:#fff3dc;
    --paper:#f6f7fb;
    --white:#ffffff;
    --ink:#10172b;
    --ink-soft:#525d7a;
    --line:#e2e6f0;
    --green:#1f9d6c;
    --red:#d6483d;
    --radius:14px;
    --shadow-sm:0 1px 2px rgba(15,23,55,.06), 0 1px 1px rgba(15,23,55,.04);
    --shadow-md:0 8px 24px rgba(15,23,55,.10);
    --shadow-lg:0 20px 48px rgba(15,23,55,.18);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;display:flex;flex-direction:column;}
  @media (min-width:680px){
    .app{max-width:900px;}
  }

  /* ---------- Header / live ticker (signature element) ---------- */
  .topbar{
    background:linear-gradient(135deg,var(--navy-950) 0%, var(--navy-800) 100%);
    color:#fff;
    padding:18px 20px 0;
    position:sticky;top:0;z-index:30;
    box-shadow:var(--shadow-md);
  }
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:36px;height:36px;border-radius:9px;
    background:conic-gradient(from 220deg, var(--amber-400), var(--amber-500) 40%, var(--navy-600) 70%, var(--amber-400));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;letter-spacing:.5px;color:var(--navy-950);
    flex-shrink:0;
  }
  .brand-text h1{font-size:14.5px;font-weight:800;margin:0;letter-spacing:.2px;line-height:1.2;}
  .brand-text p{font-size:10.5px;margin:1px 0 0;color:#aab4d6;letter-spacing:.4px;text-transform:uppercase;font-weight:600;}
  .topbar-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);color:#fff;display:flex;align-items:center;justify-content:center;
    cursor:pointer;position:relative;transition:background .15s;
  }
  .icon-btn:hover{background:rgba(255,255,255,.14);}
  .icon-btn svg{width:16px;height:16px;}
  .badge-dot{
    position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;
    background:var(--red);border:2px solid var(--navy-950);
  }

  .ticker-wrap{
    margin-top:14px;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);
    border-radius:12px;
    padding:11px 14px;
    display:flex;align-items:center;gap:10px;
    backdrop-filter:blur(2px);
  }
  .ticker-wrap.is-live{
    background:linear-gradient(90deg, rgba(245,166,35,.18), rgba(255,255,255,.05));
    border-color:rgba(245,166,35,.45);
  }
  .live-pulse{
    width:8px;height:8px;border-radius:50%;background:var(--amber-400);flex-shrink:0;
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,166,35,.6);}70%{box-shadow:0 0 0 7px rgba(245,166,35,0);}100%{box-shadow:0 0 0 0 rgba(245,166,35,0);}}
  .ticker-text{flex:1;min-width:0;}
  .ticker-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--amber-400);font-weight:700;margin-bottom:2px;}
  .ticker-main{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ticker-sub{font-size:11px;color:#c3cae6;margin-top:1px;}

  .tabs{
    display:flex;gap:4px;padding:14px 20px 0;margin-top:2px;
  }
  .tab{
    flex:1;text-align:center;padding:9px 4px;font-size:12px;font-weight:600;color:#9aa6cc;
    border-bottom:2.5px solid transparent;cursor:pointer;transition:color .15s;
    display:flex;align-items:center;justify-content:center;gap:5px;
  }
  .tab svg{width:14px;height:14px;}
  .tab.active{color:#fff;border-bottom-color:var(--amber-400);}

  /* ---------- Content ---------- */
  .content{flex:1;padding:18px 20px 100px;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 12px;}
  .section-head:first-child{margin-top:4px;}
  .section-head h2{font-size:15px;font-weight:800;margin:0;letter-spacing:.1px;}
  .section-head .count{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
  .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--navy-600);font-weight:700;margin-bottom:4px;}

  /* Stat strip */
  .stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  .stat-card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm);
  }
  .stat-num{font-family:'Oswald',sans-serif;font-size:26px;font-weight:600;color:var(--navy-900);line-height:1;letter-spacing:.3px;}
  .stat-num.amber{color:var(--amber-500);}
  .stat-lbl{font-size:10px;color:var(--ink-soft);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}

  /* Event cards */
  .event-card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 14px 13px;margin-bottom:12px;box-shadow:var(--shadow-sm);cursor:pointer;
    transition:box-shadow .18s, transform .12s;position:relative;overflow:hidden;
  }
  .event-card::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
    background:var(--line);transition:background .15s;
  }
  .event-card:active{transform:scale(.985);}
  .event-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .event-card-cricket{
    background:linear-gradient(160deg,#fff 0%, #fbfdf9 100%);
    border-color:#dceadd;
  }
  .event-card-cricket::before{background:linear-gradient(180deg,var(--green),#0d7a4f);}...
